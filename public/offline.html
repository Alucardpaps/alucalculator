<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | AluCalculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .icon {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 400px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 400px;
        }

        .info-box h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }

        .info-box ul {
            text-align: left;
            font-size: 0.9rem;
            padding-left: 1.5rem;
        }

        .info-box li {
            margin-bottom: 0.3rem;
        }

        button {
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            color: #ffffff;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
    </svg>

    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features require a connection to work.</p>

    <div class="info-box">
        <h2>Available Offline:</h2>
        <ul>
            <li>Weight Calculator (basic shapes)</li>
            <li>Alloy Database (cached data)</li>
            <li>Kerf Loss Tables</li>
            <li>Saved Preferences</li>
        </ul>
    </div>

    <button onclick="window.location.reload()">
        Try Again
    </button>

    <script>
        // Check if online and redirect
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>

</html>
